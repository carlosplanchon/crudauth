[project]
site_name = "crudauth"
site_description = "Batteries-included, transport-agnostic authentication for FastAPI."
site_url = "https://benavlabs.github.io/crudauth"
docs_dir = "docs"
site_dir = "site"

copyright = "&copy; 2026 Benav Labs"

extra_css = ["stylesheets/extra.css"]

# ==============================================================================
# Theme
# ==============================================================================

[project.theme]
variant = "modern"

logo = "assets/crudauth-header.png"
favicon = "assets/icon.svg"

font.text = "Ubuntu"
font.code = "JetBrains Mono"

features = [
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.tabs",
    "navigation.indexes",
    "navigation.top",
    "navigation.footer",
    "search.suggest",
    "search.highlight",
    "content.code.copy",
    "content.code.annotate",
    "content.tooltips",
    "toc.follow",
]

# Teal brand colors live in docs/stylesheets/extra.css (primary/accent = "custom").
[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# ==============================================================================
# Repo
# ==============================================================================

repo_name = "benavlabs/crudauth"
repo_url = "https://github.com/benavlabs/crudauth"
edit_uri = "edit/main/docs/"

# ==============================================================================
# Navigation
#   Grown page-by-page as sections land, so `uvx zensical serve` never breaks on
#   a missing file.
# ==============================================================================

[[project.nav]]
"crudauth" = "index.md"

[[project.nav]]
"Why crudauth?" = "why-crudauth.md"

[[project.nav]]
"Guides" = [
    { "Overview" = "guides/index.md" },
    { "Authentication" = [
        { "Overview" = "guides/auth/index.md" },
        { "Protecting routes" = "guides/auth/protecting-routes.md" },
        { "Sessions" = "guides/auth/sessions.md" },
        { "Bearer tokens" = "guides/auth/bearer.md" },
        { "Multiple transports" = "guides/auth/multiple-transports.md" },
        { "OAuth" = "guides/auth/oauth.md" },
        { "Sudo mode" = "guides/auth/sudo.md" },
    ] },
]

[[project.nav]]
"API Reference" = [
    { "Overview" = "api/index.md" },
    { "CRUDAuth" = "api/crud-auth.md" },
    { "Principal" = "api/principal.md" },
    { "Transports" = "api/transports.md" },
    { "OAuth" = "api/oauth.md" },
    { "Email" = "api/email.md" },
    { "Hooks" = "api/hooks.md" },
    { "Sudo" = "api/sudo.md" },
    { "UserRepository" = "api/repository.md" },
    { "Models" = "api/models.md" },
    { "Rate limiting & lockout" = "api/ratelimit.md" },
    { "Storage" = "api/storage.md" },
    { "Core types" = "api/core.md" },
    { "Exceptions" = "api/exceptions.md" },
    { "Utilities" = "api/utils.md" },
]

# ==============================================================================
# Markdown extensions
# ==============================================================================

[[project.markdown_extensions]]
admonition = {}

[[project.markdown_extensions]]
"abbr" = {}

[[project.markdown_extensions]]
"codehilite" = {}

[[project.markdown_extensions]]
"toc" = { permalink = true }

[[project.markdown_extensions]]
"pymdownx.details" = {}

[[project.markdown_extensions]]
"pymdownx.highlight" = { anchor_linenums = true, line_spans = "__span", pygments_lang_class = true }

[[project.markdown_extensions]]
"pymdownx.inlinehilite" = {}

[[project.markdown_extensions]]
# auto-append the glossary so abbreviations get hover tooltips on every page.
# It's a .txt so zensical injects it as a snippet but doesn't build it as a page.
"pymdownx.snippets" = { auto_append = ["includes/abbreviations.txt"], base_path = ["docs"] }

[[project.markdown_extensions]]
"pymdownx.superfences" = {}

[[project.markdown_extensions]]
"pymdownx.tabbed" = { alternate_style = true }

[[project.markdown_extensions]]
"attr_list" = {}

[[project.markdown_extensions]]
"md_in_html" = {}

# ==============================================================================
# Plugins
#   mkdocstrings needs the `docs` dependency group, so serve/build with:
#   `uv run --group docs zensical serve`  (plain `uvx zensical` won't have it).
# ==============================================================================

[[project.plugins]]
"mkdocstrings" = { config = { handlers = { python = { options = { docstring_style = "google", show_source = false, show_root_heading = true, show_symbol_type_heading = true, show_symbol_type_toc = true, members_order = "source", separate_signature = true, show_signature_annotations = true, signature_crossrefs = true, merge_init_into_class = true, heading_level = 2 } } } } }
