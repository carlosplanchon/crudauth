[project]
site_name = "crudauth"
site_description = "Batteries-included, transport-agnostic authentication for FastAPI."
site_url = "https://benavlabs.github.io/crudauth"
docs_dir = "docs"
site_dir = "site"

copyright = "&copy; 2026 Benav Labs"

extra_css = ["stylesheets/extra.css"]

# ==============================================================================
# Theme
# ==============================================================================

[project.theme]
variant = "modern"

logo = "assets/crudauth-header.png"
favicon = "assets/icon.svg"

font.text = "Ubuntu"
font.code = "JetBrains Mono"

features = [
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.tabs",
    "navigation.indexes",
    "navigation.top",
    "navigation.footer",
    "search.suggest",
    "search.highlight",
    "content.code.copy",
    "content.code.annotate",
    "content.tooltips",
    "toc.follow",
]

# Teal brand colors live in docs/stylesheets/extra.css (primary/accent = "custom").
[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# ==============================================================================
# Repo
# ==============================================================================

repo_name = "benavlabs/crudauth"
repo_url = "https://github.com/benavlabs/crudauth"
edit_uri = "edit/main/docs/"

# ==============================================================================
# Navigation
#   Grown page-by-page as sections land, so `uvx zensical serve` never breaks on
#   a missing file.
# ==============================================================================

